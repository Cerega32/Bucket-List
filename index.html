<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#FFFFFF" />
		<meta name="description" content="Delting - платформа для достижения целей и составления списков желаний" />
		<title>Delting</title>
		<meta property="og:title" content="Delting" />
		<meta property="og:description" content="Delting - платформа для достижения целей и составления списков желаний" />
		<meta property="og:image" content="/delting.jpg" />
		<meta property="og:url" content="https://delting.ru" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Delting" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Delting" />
		<meta name="twitter:description" content="Delting - платформа для достижения целей и составления списков желаний" />
		<meta name="twitter:image" content="/delting.jpg" />
		<meta property="telegram:title" content="Delting" />
		<meta property="telegram:description" content="Delting - платформа для достижения целей и составления списков желаний" />
		<meta property="telegram:image" content="/delting.jpg" />
		<meta property="vk:image" content="/delting.jpg" />

		<script>
			(function () {
				try {
					var stored = localStorage.getItem('color-theme');
					var mode = stored === 'light' || stored === 'dark'
						? stored
						: (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
					document.documentElement.setAttribute('data-theme', mode);
					var meta = document.querySelector('meta[name="theme-color"]');
					if (meta) meta.setAttribute('content', mode === 'dark' ? '#0D121A' : '#FFFFFF');
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'light');
				}
			})();
		</script>
	</head>
	<body>
		<noscript>You need to enable JavaScript to run this</noscript>
		<div id="root"></div>
	</body>
	<script type="module" src="/src/index.tsx"></script>
</html>
